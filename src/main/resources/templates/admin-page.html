<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout :: head('Панель администратора', true)}"></head>
<body>
<header th:replace="~{layout :: main-header(${profile != null ? profile.avatarUrl : ''})}"></header>

<div class="main-layout">
    <aside th:replace="~{layout :: sidebar('')}"></aside>

    <main class="profile-container" style="max-width:1100px;">
        <div class="profile-card">
            <h2 style="font-size:20px; margin-bottom: 20px;">Все пользователи системы (Панель админа)</h2>

            <div class="results-grid">
                <th:block th:if="${users != null && !#lists.isEmpty(users)}"
                          th:each="u : ${users}">
                    <div th:replace="~{friends_components :: user-item(user=${u})}"></div>
                </th:block>
            </div>

            <div th:if="${#lists.isEmpty(users)}">
                <p style="color: #888;">В базе данных нет зарегистрированных пользователей.</p>
            </div>
        </div>
    </main>
</div>

<th:block th:replace="~{layout :: htmx-scripts}"></th:block>
</body>
</html>
