<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{html/layout :: head('Люди', true)}"></head>
<body>
    <header th:replace="~{html/layout :: main-header(${profile != null ? profile.avatarUrl : ''})}"></header>
    
    <div class="main-layout">
        <aside th:replace="~{html/layout :: sidebar('people')}"></aside>


        <main class="profile-container" style="max-width:1100px;">
            <div class="profile-card" style="margin-bottom:30px;">
                <h2 style="font-size:20px; margin-bottom:20px;">Поиск профилей</h2>

                <form th:action="@{/profiles/people/find}" method="get" id="searchForm" class="search-form">
                    <div class="search-grid">
                        <div class="input-group">
                            <input type="text" name="name" placeholder="Имя">
                        </div>
                        <div class="input-group">
                            <input type="text" name="city" placeholder="Город">
                        </div>
                        <div class="input-group">
                            <input type="date" name="birthDate" style="color:white;">
                        </div>
                        <div class="input-group">
                            <button type="submit" class="btn btn-primary" style="width:100%;">Найти</button>
                        </div>
                    </div>
                </form>

                <div id="searchError" class="error-msg" style="display:none; margin-top:15px;"></div>
            </div>

            <div class="profile-card">
                <h2 style="font-size:20px; margin-bottom: 20px;">Результаты</h2>
                <div class="results-grid">
                    <th:block th:if="${results != null && !#lists.isEmpty(results)}" 
                              th:each="u : ${results}">
                        <div th:replace="~{html/friends_components :: user-item(user=${u})}"></div>
                    </th:block>
                </div>
                <div th:if="${#lists.isEmpty(results)}">
                    Ничего не найдено.
                </div>
            </div>
        </main>
    </div>

    <th:block th:replace="~{html/layout :: htmx-scripts}"></th:block>
</body>
</html>
