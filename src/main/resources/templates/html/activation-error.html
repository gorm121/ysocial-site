<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ошибка подтверждения - Ysocial</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/style/style.css}">
    <link rel="icon" type="image/x-icon" th:href="@{/favicon.ico}">
</head>
<body>

<header th:replace="~{html/layout :: auth-header}"></header>

<main class="login-wrapper">
    <div class="login-card" style="text-align: center;">

        <div class="brand-logo">
            <div class="logo-circle" style="background-color: #dc3545; color: white;">
                <span class="logo-text">!</span>
            </div>
        </div>

        <h1 class="form-title">Ошибка активации</h1>

        <div class="error-msg" style="margin-bottom: 24px;">
            <span th:text="${errorMessage}">Не удалось подтвердить ваш аккаунт. Возможно, ссылка устарела или недействительна.</span>
        </div>

        <div class="actions">
            <a th:href="@{/register}" class="btn btn-primary" style="display: block; text-align: center; text-decoration: none; margin-bottom: 12px;">ПОВТОРИТЬ РЕГИСТРАЦИЮ</a>
            <a th:href="@{/login}" class="btn btn-secondary" style="display: block; text-align: center; text-decoration: none;">НА СТРАНИЦУ ВХОДА</a>
        </div>

    </div>
</main>
</body>
</html>
