<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация Ysocial</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="icon" type="image/x-icon" th:href="@{/favicon.ico}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/style/style.css}">
</head>
<body>
    <header class="app-header">
        <div class="header-logo"><div class="logo-icon small">Y</div></div>
        <div class="header-avatar"></div>
    </header>

    <main class="login-wrapper">
        <div class="login-card">
            <div class="brand-logo">
                <div class="logo-circle"><span class="logo-text">Y</span></div>
            </div>

            <div id="register-step">
                <h1 class="form-title">Регистрация Ysocial</h1>
                
                <form th:action="@{/register}" method="post" class="login-form">
                    <div class="input-group">
                        <input type="email" name="email" id="email" placeholder="почта" required>
                    </div>
                    <div class="input-group">
                        <input type="text" name="username" id="username" placeholder="никнейм" required autocomplete="off">
                    </div>
                    <div class="input-group">
                        <input type="password" name="password" id="password" placeholder="пароль" required>
                    </div>
                    <div class="input-group">
                        <input type="password" name="confirmPassword" id="confirmPassword" placeholder="повтор пароля" required>
                    </div>

                    <div class="actions">
                        <button type="submit" class="btn btn-primary">Регистрация</button>
                        <a th:href="@{/login}" class="btn btn-secondary">У меня есть аккаунт</a>
                    </div>
                </form>
            </div>
        </div>
    </main>
</body>
</html>
